<footer class="site-footer">
  <div class="wrap footer-grid">
    <div class="footer-brand">
      <span class="brand-text">A Uniter, Not a Divider.</span>
      <p class="footer-tag">{{ .Site.Params.description }}</p>
    </div>

    <nav class="footer-nav" aria-label="Footer">
      <h2 class="footer-heading">Site</h2>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>

  <div class="wrap footer-legal">
    <p class="disclaimer">{{ .Site.Params.disclaimer }}</p>
    <p class="copyright">&copy; {{ now.Year }} Ahsen for Virginia. All rights reserved.</p>
  </div>
</footer>
