<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ "/" | relURL }}">
      <span class="brand-mark" aria-hidden="true">AM</span>
      <span class="brand-text">Ahsen&nbsp;Malik</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav" aria-label="Main">
      {{ range .Site.Menus.main }}
        {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
        {{ if .Children }}
        <div class="nav-item has-dropdown">
          <a href="{{ .URL }}" class="{{ if $active }}is-active{{ end }}">{{ .Name }}</a>
          <div class="dropdown-menu">
            {{ range .Children }}
            <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
          </div>
        </div>
        {{ else }}
        <a href="{{ .URL }}" class="{{ if $active }}is-active{{ end }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
  </div>
</header>
