{{ define "main" }}
<section class="page-head">
  <div class="wrap">
    <p class="eyebrow">NoVA Turnout</p>
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
</section>

<section class="page-body">
  <div class="wrap prose">
    {{ .Content }}
    <ul class="post-list">
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
