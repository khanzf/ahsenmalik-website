baseURL = "https://example.org/"
languageCode = "en-us"
title = "Ahsen Malik for Congress"

# Disable Hugo's tagline in <title> if you prefer; left on for clarity.
enableEmoji = true

# A campaign brochure site doesn't need tag/category archive pages.
disableKinds = ["taxonomy", "term"]

# ---------------------------------------------------------------------------
# Site-wide parameters. Edit these to change footer copy and the required
# campaign-finance disclaimer — no template editing required.
# ---------------------------------------------------------------------------
[params]
  description = "Bringing Americans on the left, right, and center together with the firm belief that we have more in common than our disagreements, and that we should agree to disagree civilly with mutual respect."
  # Required disclaimer for campaign advertisements, including websites.
  # Update if the committee's registered name changes.
  disclaimer = "Paid for by Ahsen for Virginia."

# ---------------------------------------------------------------------------
# Main navigation. Add, remove, or reorder top-level pages here (lower
# weight = first). Issue pages are nested under "Issues" via `parent` and
# render as a dropdown — add a new issue by copying one of those entries.
# ---------------------------------------------------------------------------
[menus]
  [[menus.main]]
    name = "About Ahsen"
    pageRef = "/about"
    weight = 10
  [[menus.main]]
    name = "Issues"
    pageRef = "/issues"
    weight = 20
  [[menus.main]]
    name = "Abortion: The Bold Truth"
    pageRef = "/issues/abortion"
    parent = "Issues"
    weight = 21
  [[menus.main]]
    name = "Data Centers"
    pageRef = "/issues/data-centers"
    parent = "Issues"
    weight = 22
  [[menus.main]]
    name = "Effective and Lasting Climate Policy"
    pageRef = "/issues/climate"
    parent = "Issues"
    weight = 23
  [[menus.main]]
    name = "Inflation and Rising Grocery Prices"
    pageRef = "/issues/inflation"
    parent = "Issues"
    weight = 24
  [[menus.main]]
    name = "Iran and Israel"
    pageRef = "/issues/iran-and-israel"
    parent = "Issues"
    weight = 25
  [[menus.main]]
    name = "Universal Health Security"
    pageRef = "/issues/health-security"
    parent = "Issues"
    weight = 26
  [[menus.main]]
    name = "Vote For Your True #1: Presidential Election Reform"
    pageRef = "/issues/election-reform"
    parent = "Issues"
    weight = 27
  [[menus.main]]
    name = "Get Involved"
    pageRef = "/get-involved"
    weight = 30
  [[menus.main]]
    name = "Contact"
    pageRef = "/contact"
    weight = 40
  [[menus.main]]
    name = "Donate"
    pageRef = "/donate"
    weight = 50

[markup.goldmark.renderer]
  unsafe = true  # allow raw HTML in markdown content files
